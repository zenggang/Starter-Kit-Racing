name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - master
    paths:
      - 'realtime-worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: realtime-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: realtime-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test worker
        run: npm test

      - name: Typecheck worker
        run: npm run typecheck

      - name: Deploy worker
        run: npm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
