<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Racing</title>
	<style>
		body { margin: 0; overflow: hidden; background: #000; }
		canvas { display: block; touch-action: none; }
		#editor-link {
			position: absolute;
			bottom: 12px;
			right: 16px;
			color: #fff;
			font: 14px sans-serif;
			text-decoration: none;
			background: rgba(0,0,0,0.5);
			padding: 8px 14px;
			border-radius: 6px;
			z-index: 10;
		}
		#editor-link:hover { background: rgba(0,0,0,0.7); }
		@media (pointer: coarse) {
			#editor-link { bottom: auto; top: 12px; right: 12px; }
		}
	</style>
	<script type="importmap">
	{
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
			"crashcat": "https://esm.sh/crashcat@0.0.3"
		}
	}
	</script>
</head>
<body>
	<a id="editor-link" href="editor.html">Create your own track</a>
	<script>
		const map = new URLSearchParams( location.search ).get( 'map' );
		if ( map ) {
			const link = document.getElementById( 'editor-link' );
			link.href = 'editor.html?map=' + map;
			link.textContent = 'Edit this track';
		}
	</script>
	<script type="module" src="js/standalone.js"></script>
</body>
</html>
